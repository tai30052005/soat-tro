server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # SPA: mọi đường dẫn không phải file tĩnh đều trả index.html
    # -> để React Router xử lý định tuyến phía client.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy các lời gọi API sang container backend (tên service 'app' trong mạng Docker).
    # Nhờ vậy frontend gọi "/api/..." cùng origin -> không vướng CORS.
    location /api/ {
        proxy_pass http://app:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Upload ảnh hợp đồng nhiều trang -> nới giới hạn body (khớp backend 30MB).
        client_max_body_size 30m;
    }
}
