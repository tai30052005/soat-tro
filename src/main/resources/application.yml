spring:
  application:
    name: soat-tro-api

  # ===== Kết nối cơ sở dữ liệu (PostgreSQL) =====
  # Dùng biến môi trường với giá trị mặc định (localhost) để chạy local;
  # khi chạy bằng Docker Compose các biến này sẽ được override.
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:soattro}
    username: ${DB_USER:soattro}
    password: ${DB_PASSWORD:soattro}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      # 'validate': Hibernate chỉ kiểm tra entity khớp với schema, KHÔNG tự sửa bảng.
      # Việc tạo/đổi bảng do Flyway đảm nhiệm (an toàn cho môi trường thật).
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false   # tắt anti-pattern OSIV để tránh giữ session quá lâu

  # ===== Flyway: tự chạy các script migration trong db/migration khi khởi động =====
  flyway:
    enabled: true
    locations: classpath:db/migration

  # ===== Upload file (ảnh/PDF hợp đồng) =====
  # Hợp đồng chụp nhiều trang -> cho phép request tổng tới 30MB.
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 30MB

# ===== Cấu hình ứng dụng =====
app:
  jwt:
    # CHỈ DÙNG CHO DEV. Production phải đặt qua biến môi trường JWT_SECRET.
    # Khóa cần đủ dài (>= 32 ký tự) cho thuật toán HMAC-SHA256.
    secret: ${JWT_SECRET:change-me-to-a-long-random-secret-key-at-least-32-bytes}
    # Thời hạn token: 24 giờ (tính bằng mili-giây)
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

  # ===== CORS =====
  # Danh sách origin frontend được phép gọi API (ngăn cách bởi dấu phẩy).
  # Khi DEPLOY, đặt biến môi trường CORS_ALLOWED_ORIGINS = domain frontend.
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://127.0.0.1:3000,http://localhost:3001,http://127.0.0.1:3001,http://localhost:5173,http://127.0.0.1:5173,http://localhost:4173,http://127.0.0.1:4173}

  # ===== AI (Google Gemini) — đọc & phân tích hợp đồng =====
  # Để trống api-key thì tính năng tự tắt. Lấy key miễn phí ở https://aistudio.google.com
  # — KHÔNG commit key vào repo. Cần model có khả năng vision đọc chữ tiếng Việt.
  # Lưu ý (2026-07): họ gemini-2.5-* trả 404 với API key TẠO MỚI; 2.0-flash quota 0.
  # -> mặc định gemini-3-flash-preview (free, vision tốt). Đổi bằng env GEMINI_MODEL.
  ai:
    api-key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3-flash-preview}

# ===== Swagger / OpenAPI =====
springdoc:
  swagger-ui:
    path: /swagger-ui.html

server:
  # Render cấp cổng qua biến môi trường PORT; local mặc định 8080.
  port: ${PORT:8080}
