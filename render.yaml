# Render Blueprint — deploy backend Spring Boot (0đ).
# Dùng: trên render.com -> New + -> Blueprint -> trỏ vào repo này.
# Database: dùng Neon (free tier rộng hơn Postgres của Render) — điền DB_* bên dưới.
services:
  - type: web
    name: soat-tro-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      # Render tự cấp PORT; app đọc ${PORT:8080}. Không cần đặt tay.
      # ----- Kết nối Neon Postgres (đặt trong dashboard, KHÔNG commit) -----
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_NAME
        sync: false
      - key: DB_PARAMS
        value: "?sslmode=require"     # Neon bắt buộc SSL
      - key: DB_USER
        sync: false
      - key: DB_PASSWORD
        sync: false
      # ----- Bảo mật -----
      - key: JWT_SECRET
        generateValue: true          # Render tự sinh chuỗi ngẫu nhiên đủ dài
      # ----- AI (Google Gemini) -----
      - key: GEMINI_API_KEY
        sync: false
      - key: GEMINI_MODEL
        value: gemini-3-flash-preview
      # ----- CORS: domain frontend trên Vercel -----
      - key: CORS_ALLOWED_ORIGINS
        sync: false                  # vd https://soat-tro.vercel.app
